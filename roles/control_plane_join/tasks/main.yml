---
- name: Get master certificate
  ansible.builtin.command:
    cmd: "kubeadm init phase upload-certs --upload-certs "
  register: control_plane_join_cert_result
  delegate_to: "{{ primary_master }}"
  changed_when: false

- name: Get join token
  ansible.builtin.command:
    cmd: "kubeadm token create --print-join-command"
  register: control_plane_join_token_result
  delegate_to: "{{ primary_master }}"
  changed_when: false

- name: Set join facts
  ansible.builtin.set_fact:
    control_plane_join_token: "{{ control_plane_join_token_result.stdout.split()[4] }}"
    control_plane_join_ca_cert_hash: "{{ control_plane_join_token_result.stdout.split()[6] }}"
    control_plane_join_cert: "{{ control_plane_join_cert_result.stdout_lines | last }}"

- name: Copy join template
  ansible.builtin.template:
    src: kubeadm-join-config.yaml.j2
    dest: /tmp/k8s-join-config.yaml
    owner: "{{ remote_user }}"
    group: "{{ remote_user }}"
    mode: "0644"

- name: Join control plane
  ansible.builtin.command:
    cmd: "kubeadm join --config /tmp/k8s-join-config.yaml"
    creates: /etc/kubernetes/kubelet.conf
