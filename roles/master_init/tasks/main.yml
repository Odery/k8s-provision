---
- name: Move k8s template to the master
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: "0644"
  loop:
    - src: "kubeadm-config.yaml.j2"
      dest: "/tmp/kubeadm-config.yaml"
    - src: "calico-custom-resources.yaml.j2"
      dest: "/tmp/calico-custom-resources.yaml"

- name: Initialize k8s master
  ansible.builtin.command:
    cmd: "kubeadm init --config /tmp/kubeadm-config.yaml"
    creates: /etc/kubernetes/admin.conf

- name: Create kube user dir
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.kube"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Confgure kubectl access for the user
  ansible.builtin.copy:
    remote_src: true
    src: /etc/kubernetes/admin.conf
    dest: "/home/{{ ansible_user }}/.kube/config"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"

- name: Install Tigera operator for managing Calico
  ansible.builtin.command:
    cmd: "kubectl apply -f {{ tigera_operator_manifest_url }}"
  register: master_init_tigera_result
  changed_when: "'created' in master_init_tigera_result.stdout or 'configured' in master_init_tigera_result.stdout"
  become: false

- name: Wait for the Tigera operator to be ready
  ansible.builtin.command:
    cmd: "kubectl get crd installations.operator.tigera.io"
  become: false
  changed_when: false
  register: master_init_crd_check
  until: master_init_crd_check.rc == 0
  retries: 20
  delay: 10

- name: Install Calico CNI
  ansible.builtin.command:
    cmd: "kubectl apply -f /tmp/calico-custom-resources.yaml"
  register: master_init_calico_result
  changed_when: "'created' in master_init_calico_result.stdout or 'configured' in master_init_calico_result.stdout"
  become: false

- name: Wait for Calico to be ready
  ansible.builtin.command:
    cmd: "kubectl wait --for=condition=Ready pods --all -n calico-system --timeout=60s"
  changed_when: false
  become: false
  register: master_init_calico_wait
  until: master_init_calico_wait.rc == 0
  retries: 20
  delay: 15
