---
- name: Move k8s template to the master
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: "0644"
  loop:
    - src: "kubeadm-config.yaml.j2"
      dest: "/tmp/kubeadm-config.yaml"
    - src: "calico-custom-resources.yaml.j2"
      dest: "/tmp/calico-custom-resources.yaml"

- name: Initialize k8s master
  ansible.builtin.command:
    cmd: "kubeadm init --config /tmp/kubeadm-config.yaml"
    creates: /etc/kubernetes/admin.conf

- name: Create kube user dir
  ansible.builtin.file:
    path: "/home/{{ remote_user }}/.kube"
    state: directory
    owner: "{{ remote_user }}"
    group: "{{ remote_user }}"
    mode: "0755"

- name: Confgure kubectl access for the user
  ansible.builtin.copy:
    remote_src: true
    src: /etc/kubernetes/admin.conf
    dest: "/home/{{ remote_user }}/.kube/config"
    owner: "{{ remote_user }}"
    group: "{{ remote_user }}"
    mode: "0644"

- name: Install Tigera operator for managing Calico
  ansible.builtin.command:
    cmd: "kubectl apply -f {{ tigera_operator_manifest_url }}"
  register: tigera_result
  changed_when: "'created' in tigera_result.stdout or 'configured' in tigera_result.stdout"

- name: Install Calico CNI
  ansible.builtin.command:
    cmd: "kubectl apply -f /tmp/calico-custom-resources.yaml"
  register: calico_result
  changed_when: "'created' in calico_result.stdout or 'configured' in calico_result.stdout"

- name: Wait for Calico to be ready
  ansible.builtin.command:
    cmd: "kubectl wait --for=condition=Ready pods --all -n calico-system --timeout=600s"
  changed_when: false
