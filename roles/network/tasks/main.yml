---
- name: Drop in netplan config for the k8s interface
  ansible.builtin.template:
    src: k8s-net.yaml.j2
    dest: /etc/netplan/k8s_net.yaml
    owner: root
    group: root
    mode: "0600"
  notify: Reapply netplan

- name: Apply pending network changes
  ansible.builtin.meta: flush_handlers

- name: Wait for the k8s interface to come up
  ansible.builtin.setup:
    filter: "ansible_{{ k8s_interface }}"
  register: network_iface_facts
  until: network_iface_facts.ansible_facts['ansible_' + k8s_interface]['ipv4'] is defined
  retries: 10
  delay: 3
